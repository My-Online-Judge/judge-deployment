global:
  scrape_interval: 15s
  # Rules are re-evaluated on this cadence; the shortest `for:` in alerts.yml is 1m, so a rule is
  # confirmed several times before it fires.
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: judge-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['judge-api:8000']
