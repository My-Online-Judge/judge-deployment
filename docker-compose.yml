# Authoritative Online Judge stack — the single source of truth for deploying every service.
# Build contexts point back at the sibling repos; only configuration lives here.
#
#   cd judge-deployment
#   docker compose up -d --build                                          # real qduoj sandbox
#   docker compose -f docker-compose.yml -f docker-compose.mock.yml up -d # mock sandbox
#
# Config is centralized in ./.env (loaded automatically by Compose).

services:
  # ---- infrastructure ------------------------------------------------------
  db:
    image: postgres:16
    container_name: oj-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    # Host publish disabled: the app reaches Postgres over the internal network (db:5432),
    # so exposing 5433 is only for external debug tools. Left off to avoid a stale
    # docker-proxy squatting on host :5433. Re-enable if you need a host-side psql.
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema is now owned by Flyway (judge-api runs V1 baseline + V2 seed on boot, ddl-auto=validate).
      # The old initdb.sql bootstrap is retired — a fresh volume is built entirely by Flyway.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [oj-net]

  kafka:
    # 3.9.0's image ships a broken /bin/bash (readline relocation errors) that makes the
    # entrypoint exit 127 on this host. 3.8.1 has a working bash and identical env convention.
    image: apache/kafka:3.8.1
    container_name: oj-kafka
    restart: unless-stopped
    # Host publish of the EXTERNAL listener is intentionally disabled: all services reach
    # Kafka over the in-network INTERNAL listener (kafka:29092), so the host port is only
    # for external debugging tools. Re-enable once nothing else on the host owns 9092.
    # ports:
    #   - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks: [oj-net]

  # ---- application services -------------------------------------------------
  judge-api:
    build: ../judge-api
    container_name: oj-judge-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    ports:
      # Canonical port. (8010 was a temporary detour when 8000 was squatted; 8000 is free again,
      # and 8010 is now held by Docker Desktop's backend — so we stay on 8000 and avoid Desktop.)
      - "8000:8000"
    networks: [oj-net]

  judge-worker:
    build: ../judge-worker
    container_name: oj-judge-worker
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      judge-server:
        condition: service_started
    env_file:
      - .env
    networks: [oj-net]

  judge-server:
    # Official QingdaoU sandbox on Docker Hub (qduoj account) — the canonical
    # registry.cn-hangzhou.aliyuncs.com/onlinejudge/judge_server is unreachable outside China.
    # Overridden by docker-compose.mock.yml for offline / non-privileged runs.
    image: qduoj/judge-server
    container_name: oj-judge-server
    restart: always
    privileged: true
    shm_size: 256m
    # Map form (not list) so docker-compose.mock.yml can override image/privileged
    # while inheriting these values via Compose's environment merge.
    environment:
      TOKEN: ${JUDGE_SERVER_TOKEN}
      SERVICE_URL: http://judge-server:8080
      BACKEND_URL: http://judge-api:8000/api/judge_server_heartbeat/
    volumes:
      - ../judge-api/src/main/resources/test_cases:/test_case:ro
      - ../judge-server/log:/log
    networks: [oj-net]

  judge-portal:
    build: ../judge-portal
    container_name: oj-judge-portal
    restart: unless-stopped
    depends_on:
      judge-api:
        condition: service_started
    ports:
      - "80:80"
    networks: [oj-net]

networks:
  oj-net:
    name: oj-net

volumes:
  pgdata:
