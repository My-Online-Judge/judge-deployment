# Authoritative Online Judge stack — the single source of truth for deploying every service.
# Build contexts point back at the sibling repos; only configuration lives here.
#
#   cd judge-deployment
#   docker compose up -d --build                                          # real qduoj sandbox
#   docker compose -f docker-compose.yml -f docker-compose.mock.yml up -d # mock sandbox
#
# Config is centralized in ./.env (loaded automatically by Compose).

# Vietnam time (GMT+7) for every service's logs and DB now()/timestamps, aliased into each service
# below. Sandboxes (judge-server, judge-server-2) are intentionally excluded — they run untrusted
# submissions and their wall-clock is irrelevant. NOTE: judge-api also pins the JVM zone in code
# (BackendServiceApplication.main) — that is what fixes its stored LocalDateTime timestamps; the TZ
# here only aligns its logs. TZ is best-effort on images without OS tzdata (alpine) — harmless if unset.
x-tz-env: &tz-env
  TZ: Asia/Ho_Chi_Minh

# Liveness for the QingdaoU sandboxes, shared by both instances.
#
# The image ships `python3 /code/service.py` as its HEALTHCHECK — QingdaoU's heartbeat, which POSTs
# to BACKEND_URL /api/judge_server_heartbeat/. This stack dispatches over Kafka and never implements
# that endpoint, so both sandboxes reported (unhealthy) forever while judging perfectly: a permanently
# red signal that trains you to ignore it. Ask the sandbox itself instead — /ping is its own liveness
# endpoint and returns live cpu/memory/judger_version. Auth is sha256(TOKEN) in X-Judge-Server-Token,
# computed inline because the sandbox stores the digest, not the raw token.
# Overridden in docker-compose.mock.yml: the mock only implements /judge.
x-sandbox-health: &sandbox-health
  test:
    - CMD
    - python3
    - -c
    - 'import hashlib,os,urllib.request as u; t=hashlib.sha256(os.environ["TOKEN"].encode()).hexdigest(); u.urlopen(u.Request("http://localhost:8080/ping",data=b"{}",headers={"X-Judge-Server-Token":t,"Content-Type":"application/json"}),timeout=3)'
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 20s

services:
  # ---- infrastructure ------------------------------------------------------
  db:
    image: postgres:16
    container_name: oj-db
    restart: unless-stopped
    # The `timezone` GUC is baked into the cluster at initdb, so the TZ env alone won't move an
    # already-initialised volume off UTC — set it (and log_timezone) explicitly. The app writes naive
    # LocalDateTime, so this only affects now()/CURRENT_TIMESTAMP and server logs, not stored audit times.
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh", "-c", "log_timezone=Asia/Ho_Chi_Minh"]
    environment:
      <<: *tz-env
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    # Host publish disabled: the app reaches Postgres over the internal network (db:5432),
    # so exposing 5433 is only for external debug tools. Left off to avoid a stale
    # docker-proxy squatting on host :5433. Re-enable if you need a host-side psql.
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema is now owned by Flyway (judge-api runs V1 baseline + V2 seed on boot, ddl-auto=validate).
      # The old initdb.sql bootstrap is retired — a fresh volume is built entirely by Flyway.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [oj-net]

  kafka:
    # 3.9.0's image ships a broken /bin/bash (readline relocation errors) that makes the
    # entrypoint exit 127 on this host. 3.8.1 has a working bash and identical env convention.
    image: apache/kafka:3.8.1
    container_name: oj-kafka
    restart: unless-stopped
    # Host publish of the EXTERNAL listener is intentionally disabled: all services reach
    # Kafka over the in-network INTERNAL listener (kafka:29092), so the host port is only
    # for external debugging tools. Re-enable once nothing else on the host owns 9092.
    # ports:
    #   - "9092:9092"
    environment:
      <<: *tz-env
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks: [oj-net]

  redis:
    # Verdict SSE fan-out across judge-api instances (pub/sub on channel oj.verdicts).
    image: redis:7-alpine
    container_name: oj-redis
    restart: unless-stopped
    environment: *tz-env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [oj-net]

  minio:
    # S3-compatible object storage: single source of truth for problem test cases (T3-8).
    # Pinned for reproducibility — this is the release the T3-8 stack was verified against.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: oj-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      <<: *tz-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks: [oj-net]

  prometheus:
    # Scrapes judge-api /actuator/prometheus. Pinned for reproducibility.
    image: prom/prometheus:v3.1.0
    container_name: oj-prometheus
    restart: unless-stopped
    environment: *tz-env
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # ops UI, loopback only
    depends_on:
      judge-api:
        condition: service_started
    networks: [oj-net]

  # ---- application services -------------------------------------------------
  judge-api:
    build: ../judge-api
    container_name: oj-judge-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *tz-env
    env_file:
      - .env
    ports:
      # Must stay 8000: judge-portal is built against VITE_API_BASE_URL=http://localhost:8000/api/v1.
      # (The old 8010 workaround is retired — the squatter was Docker Desktop's proxy, not an
      # orphan needing a reboot; stopping Docker Desktop frees this port.)
      - "8000:8000"
    networks: [oj-net]

  judge-worker:
    build: ../judge-worker
    # No fixed container_name: judge-workers form a Kafka consumer group (group_id=judge-workers)
    # and are meant to scale horizontally — `docker compose up -d --scale judge-worker=3` spreads
    # the 6 submission.requested partitions across the instances. A fixed name would block scaling.
    restart: unless-stopped
    volumes:
      - test_case_cache:/test_case
    depends_on:
      kafka:
        condition: service_healthy
      # Now that the sandbox healthcheck reflects reality (see x-sandbox-health), wait for it:
      # a worker that starts first burns its retries dispatching to a sandbox still booting.
      judge-server:
        condition: service_healthy
      judge-server-2:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *tz-env
    env_file:
      - .env
    networks: [oj-net]

  judge-server:
    # Official QingdaoU sandbox on Docker Hub (qduoj account) — the canonical
    # registry.cn-hangzhou.aliyuncs.com/onlinejudge/judge_server is unreachable outside China.
    # Overridden by docker-compose.mock.yml for offline / non-privileged runs.
    image: qduoj/judge-server
    container_name: oj-judge-server
    restart: always
    privileged: true
    shm_size: 256m
    # Map form (not list) so docker-compose.mock.yml can override image/privileged
    # while inheriting these values via Compose's environment merge.
    environment:
      TOKEN: ${JUDGE_SERVER_TOKEN}
      SERVICE_URL: http://judge-server:8080
      BACKEND_URL: http://judge-api:8000/api/judge_server_heartbeat/
    volumes:
      - test_case_cache:/test_case:ro
      - ../judge-server/log:/log
    healthcheck: *sandbox-health
    networks: [oj-net]

  judge-server-2:
    # Second QingdaoU sandbox. The worker round-robins across the JUDGE_SERVER_URL comma-list with
    # failover (T1-3), so a second sandbox adds judging throughput and survives one sandbox dying.
    # Each sandbox needs its OWN writable /log (they can't share one), hence a dedicated volume.
    image: qduoj/judge-server
    container_name: oj-judge-server-2
    restart: always
    privileged: true
    shm_size: 256m
    environment:
      TOKEN: ${JUDGE_SERVER_TOKEN}
      SERVICE_URL: http://judge-server-2:8080
      BACKEND_URL: http://judge-api:8000/api/judge_server_heartbeat/
    volumes:
      - test_case_cache:/test_case:ro
      - js2log:/log
    healthcheck: *sandbox-health
    networks: [oj-net]

  judge-portal:
    build: ../judge-portal
    container_name: oj-judge-portal
    restart: unless-stopped
    environment: *tz-env
    depends_on:
      judge-api:
        condition: service_started
    ports:
      - "80:80"
    networks: [oj-net]

networks:
  oj-net:
    name: oj-net

volumes:
  pgdata:
  js2log:
  miniodata:
  test_case_cache:
  promdata:
